<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacak Pesanan - ASYNC SOLUTIONS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --ink: #0f0f13;
            --coral: #e85a4f;
            --white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --gradient-primary: linear-gradient(135deg, #e85a4f 0%, #f4a261 100%);
        }

        body {
            background-color: var(--ink);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(232, 90, 79, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(107, 144, 128, 0.1) 0%, transparent 40%);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            font-family: 'Instrument Sans', sans-serif;
        }

        /* Navbar */
        .tracking-nav {
            padding: 24px 0;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 40px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo */
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-svg {
            width: 44px;
            height: 36px;
            display: block;
            flex-shrink: 0;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), filter 0.5s ease;
            filter: drop-shadow(0 0 8px rgba(232, 90, 79, 0.3));
        }

        .loop-path-base, .loop-path-overlay {
            transition: stroke-dashoffset 0.8s ease, filter 0.5s ease;
        }

        .brand-logo:hover .logo-svg {
            transform: scale(1.06) translateY(-1px);
            filter: drop-shadow(0 0 16px rgba(232, 90, 79, 0.5));
        }

        .brand-logo:hover .loop-path-overlay {
            filter: drop-shadow(0 0 8px rgba(232, 90, 79, 0.6));
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            gap: 2px;
        }

        .logo-main {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 0.05em;
            background: linear-gradient(180deg, #ffffff 10%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            line-height: 1.0;
        }

        .logo-suffix {
            font-family: 'Sora', sans-serif;
            font-weight: 400;
            font-size: 10px;
            letter-spacing: 0.28em;
            background: linear-gradient(180deg, #ffffff 20%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            opacity: 0.85;
            line-height: 1.1;
        }

        /* Main Content */
        .tracking-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0 24px;
        }

        .tracking-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tracking-title {
            font-family: 'Sora', sans-serif;
            font-size: 28px;
            margin-bottom: 12px;
            background: linear-gradient(to right, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tracking-subtitle {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .track-input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-family: 'Instrument Sans', sans-serif;
            font-size: 16px;
            text-align: center;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .track-input:focus {
            outline: none;
            border-color: var(--coral);
            box-shadow: 0 0 0 4px rgba(232, 90, 79, 0.15);
            background: rgba(0, 0, 0, 0.5);
        }

        .track-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .track-action-btn {
            width: 100%;
            padding: 18px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(232, 90, 79, 0.2);
        }

        .track-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(232, 90, 79, 0.3);
        }

        .track-action-btn:active {
            transform: translateY(0);
        }

        .track-action-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            margin-bottom: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--white);
        }

        /* Result Styles */
        .tracking-status {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        .footer-simple {
            text-align: center;
            padding: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .tracking-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>

<body>

    <nav class="tracking-nav">
        <div class="nav-container">
            <a href="index.html" class="brand-logo">
                <svg class="logo-svg" viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Premium Warm Gradient -->
                        <linearGradient id="logo-grad-track" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#e85a4f" />
                            <stop offset="50%" stop-color="#f4a261" />
                            <stop offset="100%" stop-color="#e85a4f" />
                        </linearGradient>
                        <!-- Shadow Filter for 3D Overlap -->
                        <filter id="logo-shadow-track" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="-0.8" dy="1.8" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.6" />
                        </filter>
                    </defs>
                    <!-- 1. Seamless base path -->
                    <path class="loop-path-base" d="M 26 74 C 26 62, 34 38, 46 24 C 50 19, 55 18, 60 18 C 65 18, 70 19, 74 24 C 86 38, 94 62, 94 66 C 94 72, 100 72, 106 66 C 112 58, 112 38, 106 30 C 100 24, 94 24, 94 30 C 94 36, 82 42, 60 48 C 38 54, 26 60, 26 66 C 26 72, 20 72, 14 66 C 8 58, 8 38, 14 30 C 20 24, 26 24, 26 30 C 26 36, 38 42, 60 48 C 82 54, 94 62, 94 74" fill="none" stroke="url(#logo-grad-track)" stroke-width="9.5" stroke-linecap="round" stroke-linejoin="round" />
                    <!-- 2. Overlapping front segments (to cast shadows) -->
                    <path class="loop-path-overlay" d="M 14 30 C 20 24, 26 24, 26 30 C 26 36, 38 42, 60 48" fill="none" stroke="url(#logo-grad-track)" stroke-width="9.5" stroke-linecap="round" filter="url(#logo-shadow-track)" />
                    <path class="loop-path-overlay" d="M 94 30 C 94 36, 82 42, 60 48" fill="none" stroke="url(#logo-grad-track)" stroke-width="9.5" stroke-linecap="round" filter="url(#logo-shadow-track)" />
                    <path class="loop-path-overlay" d="M 60 48 C 82 54, 94 62, 94 74" fill="none" stroke="url(#logo-grad-track)" stroke-width="9.5" stroke-linecap="round" filter="url(#logo-shadow-track)" />
                </svg>
                <div class="logo-text">
                    <span class="logo-main">ASYNC</span>
                    <span class="logo-suffix">SOLUTIONS</span>
                </div>
            </a>
            <a href="index.html" class="back-link" style="margin:0;">Kembali ke Home</a>
        </div>
    </nav>

    <div class="tracking-wrapper">
        <div class="tracking-card">
            <h1 class="tracking-title">Lacak Status Pesanan</h1>
            <p class="tracking-subtitle">Masukkan Kode Order ID yang Anda terima<br>via WhatsApp untuk melihat progress.
            </p>

            <div class="input-group">
                <input type="text" id="trackInput" class="track-input" placeholder="Contoh: ASY-2605..."
                    autocomplete="off">
            </div>

            <button id="trackBtn" class="track-action-btn">Cek Status Sekarang</button>

            <div id="trackingResult"></div>
        </div>
    </div>

    <footer class="footer-simple">
        &copy; 2026 ASYNC SOLUTIONS. All Rights Reserved.
    </footer>

    <!-- Firebase & Scripts -->
    <script type="module" src="js/script.js"></script>

</body>

</html>
